server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ecotrack;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes-long-ecotrack}
    access-token-minutes: 60

ecotrack:
  level-thresholds:
    jungbaum: 100
    baum: 250
    altbaum: 500
    legend: 1000
  registration:
    # Erlaubte Schul-E-Mail-Domains für die Selbstregistrierung.
    # Schüler und Lehrer müssen eine dieser Domains verwenden.
    # Lehrer-Domains müssen "lehrer." im Subdomain-Teil enthalten.
    allowed-domains:
      - ${REGISTRATION_DOMAIN_1:htl-leoben.at}
      - ${REGISTRATION_DOMAIN_2:schueler.htl-leoben.at}
      - ${REGISTRATION_DOMAIN_3:lehrer.htl-leoben.at}
