server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ecotrack;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Nur jwk-set-uri verwenden → kein Eager-Connect beim Start (Keycloak muss nicht beim Start laufen)
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/ecotrack/protocol/openid-connect/certs}

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:ecotrack}
    client-id: ${KEYCLOAK_CLIENT_ID:ecotrack-backend}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:ecotrack-backend-secret}

ecotrack:
  level-thresholds:
    jungbaum: 100
    baum: 250
    altbaum: 500
    legend: 1000
  registration:
    # Erlaubte Schul-E-Mail-Domains für die Selbstregistrierung.
    # Schüler und Lehrer müssen eine dieser Domains verwenden.
    # Lehrer-Domains müssen "lehrer." im Subdomain-Teil enthalten.
    allowed-domains:
      - ${REGISTRATION_DOMAIN_1:htl-leoben.at}
      - ${REGISTRATION_DOMAIN_2:schueler.htl-leoben.at}
      - ${REGISTRATION_DOMAIN_3:lehrer.htl-leoben.at}
